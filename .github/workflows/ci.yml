name: CI – Build and Test

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**/*.xml'
          retention-days: 7

      - name: Publish API artifact
        run: dotnet publish src/ApiDocuments.Api/ApiDocuments.Api.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish
          retention-days: 7
